<svg viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Verso logo">
  <!-- Mark: an open book. The left page (the "verso") is filled with the ink accent. -->
  <g transform="translate(28,28)" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- spine -->
    <line x1="32" y1="6" x2="32" y2="62" />
    <!-- left page (verso) - accent fill -->
    <path d="M32 6 C 22 0, 8 2, 2 6 L 2 56 C 8 52, 22 50, 32 56 Z" fill="#1F4E8C" fill-opacity="0.9" stroke="#1F4E8C" />
    <!-- right page (recto) - outline -->
    <path d="M32 6 C 42 0, 56 2, 62 6 L 62 56 C 56 52, 42 50, 32 56 Z" fill="none" stroke="#1A1A1A" />
  </g>

  <!-- Wordmark -->
  <text x="118" y="78" font-family="Newsreader, Georgia, 'Times New Roman', serif"
        font-size="58" font-weight="500" letter-spacing="1" fill="#1A1A1A">Verso</text>
</svg>
